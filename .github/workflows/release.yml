name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
            cross: true

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/rookeryd staging/
          cp target/${{ matrix.target }}/release/rookery staging/
          cp config.example.toml staging/
          cp rookery.service.in staging/
          cd staging
          tar czvf ../rookery-${{ matrix.target }}.tar.gz *
          cd -

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: rookery-${{ matrix.target }}
          path: rookery-${{ matrix.target }}.tar.gz

  completions:
    name: Generate Shell Completions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Generate completions
        run: |
          mkdir -p completions
          ./target/release/rookery completions bash > completions/rookery.bash
          ./target/release/rookery completions zsh > completions/_rookery
          ./target/release/rookery completions fish > completions/rookery.fish
          tar czvf completions.tar.gz completions/

      - name: Upload completions
        uses: actions/upload-artifact@v7
        with:
          name: completions
          path: completions.tar.gz

  release:
    name: Create Release
    needs: [build, completions]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -name "*.tar.gz" -exec mv {} . \;
          sha256sum *.tar.gz > SHA256SUMS
          cat SHA256SUMS
          cd -

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/SHA256SUMS
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
