llama_server = "/path/to/llama.cpp/build/bin/llama-server"
default_profile = "qwen_fast"
listen = "127.0.0.1:3000"
# Optional shared admin key for the API and dashboard.
# Leave unset or empty to disable auth.
# api_key = "rky-0123456789abcdef0123456789abcdef"
auto_start = true    # start default profile on daemon boot
idle_timeout = 1800  # seconds; 0 disables auto-sleep

# Extra directories to scan for GGUF models (in addition to HF cache)
# model_dirs = ["/mnt/models", "/home/user/gguf-collection"]

# ── Models ────────────────────────────────────────────────────────────

# HuggingFace model — downloaded automatically via llama-server -hf
[models.qwen35]
source = "hf"
repo = "unsloth/Qwen3.5-35B-A3B-GGUF"
file = "UD-Q4_K_XL"
estimated_vram_mb = 25800

[models.qwen35_27b]
source = "hf"
repo = "unsloth/Qwen3.5-27B-GGUF"
file = "UD-Q4_K_XL"
estimated_vram_mb = 24000

# vLLM model — repo only, no GGUF file needed (managed by Docker)
[models.qwen35_27b_nvfp4]
source = "hf"
repo = "kaitchup/Qwen3.5-27B-NVFP4"
estimated_vram_mb = 20000

# Local model — point directly at a GGUF file on disk
# [models.my_local_model]
# source = "local"
# path = "/home/user/models/my-model-Q4_K_M.gguf"
# estimated_vram_mb = 8000

# ── Profiles (llama-server backend) ──────────────────────────────────

[profiles.qwen_fast]
model = "qwen35"
port = 8081

[profiles.qwen_fast.llama_server]
ctx_size = 262144
threads = 4
threads_batch = 24
batch_size = 4096
ubatch_size = 1024
gpu_layers = -1
cache_type_k = "q8_0"
cache_type_v = "q8_0"
flash_attention = true
reasoning_budget = 0
chat_template = "/path/to/qwen35_chat_template.jinja"
temp = 0.7
top_p = 0.8
top_k = 20
min_p = 0.0

[profiles.qwen_thinking]
model = "qwen35"
port = 8081

[profiles.qwen_thinking.llama_server]
ctx_size = 131072
threads = 4
threads_batch = 24
batch_size = 4096
ubatch_size = 1024
gpu_layers = -1
cache_type_k = "q8_0"
cache_type_v = "q8_0"
flash_attention = true
reasoning_budget = -1
chat_template = "/path/to/qwen35_chat_template.jinja"
temp = 0.6
top_p = 0.95
top_k = 20
min_p = 0.0

[profiles.qwen_dense]
model = "qwen35_27b"
port = 8081

[profiles.qwen_dense.llama_server]
ctx_size = 131072
threads = 4
threads_batch = 24
batch_size = 4096
ubatch_size = 1024
gpu_layers = -1
cache_type_k = "q8_0"
cache_type_v = "q8_0"
flash_attention = true
reasoning_budget = 0
chat_template = "/path/to/qwen35_chat_template.jinja"
temp = 0.7
top_p = 0.8
top_k = 20
min_p = 0.0

# ── Profiles (vLLM backend) ──────────────────────────────────────────

[profiles.qwen_nvfp4]
model = "qwen35_27b_nvfp4"
port = 8081

[profiles.qwen_nvfp4.vllm]
docker_image = "vllm/vllm-openai:cu130-nightly"
gpu_memory_utilization = 0.9
max_num_seqs = 4
max_num_batched_tokens = 4096
max_model_len = 234567
quantization = "awq_marlin"
tool_call_parser = "qwen3_coder"
kv_cache_dtype = "fp8"
extra_args = ["--enable-chunked-prefill"]

# ── Agents ────────────────────────────────────────────────────────────

[agents.hermes]
command = "/home/lance/.local/bin/hermes"
args = ["gateway", "run", "--replace"]
auto_start = false
restart_on_swap = true
restart_on_crash = true
depends_on_port = 8081
version_file = "/home/lance/.hermes/hermes-agent/pyproject.toml"
update_command = "/home/lance/.local/bin/hermes update"
update_workdir = "/home/lance/.hermes/hermes-agent"
restart_on_error_patterns = ["telegram.error.TimedOut", "ReadTimeout", "deleteWebhook"]
